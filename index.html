<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BROKEN HEART</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.72);
      --soft:rgba(255,255,255,.12);
      --soft2:rgba(255,255,255,.18);
      --danger:#ff2b2b;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      overflow:hidden;
    }

    /* Layout */
    .wrap{
      height:100%;
      display:grid;
      place-items:center;
      padding:24px;
      overflow:hidden;
    }

    .card{
      width:min(820px, 92vw);
      border:1px solid var(--soft);
      border-radius:22px;
      background:rgba(255,255,255,.03);
      box-shadow: 0 22px 80px rgba(0,0,0,.65);
      overflow:hidden;
      height: calc(100vh - 48px);
      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 18px;
      border-bottom:1px solid var(--soft);
      flex: 0 0 auto;
    }

    .brand{
      display:flex;
      gap:12px;
      align-items:center;
    }

    .dot{
      width:10px;height:10px;border-radius:999px;
      background:#fff;
      box-shadow:0 0 18px rgba(255,255,255,.35);
    }

    .brand h1{
      margin:0;
      font-size:14px;
      letter-spacing:.32em;
      font-weight:700;
      text-transform:uppercase;
    }

    .hint{
      font-size:12px;
      letter-spacing:.14em;
      color:var(--muted);
      text-transform:uppercase;
    }

    .content{
      padding:28px 20px 22px;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling: touch;
      flex: 1 1 auto;
      min-height:0; /* IMPORTANT for flex scrolling */
    }

    .title{
      text-align:center;
      margin:8px 0 12px;
      font-size:44px;
      letter-spacing:.18em;
      font-weight:800;
      text-transform:uppercase;
    }

    .subtitle{
      text-align:center;
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.5;
      font-size:14px;
    }

    .row{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      appearance:none;
      border:1px solid var(--soft2);
      background:rgba(255,255,255,.04);
      color:#fff;
      padding:12px 16px;
      border-radius:16px;
      cursor:pointer;
      font-weight:650;
      letter-spacing:.08em;
      text-transform:uppercase;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      user-select:none;
    }

    button:hover{transform: translateY(-1px); border-color:rgba(255,255,255,.32)}
    button:active{transform: translateY(0px) scale(.99)}

    .primary{
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.28);
    }

    .ghost{ background:transparent; }

    .danger{
      border-color:rgba(255,43,43,.35);
    }
    .danger:hover{
      border-color:rgba(255,43,43,.7);
    }

    /* Passcode */
    .pin{
      display:flex;
      gap:10px;
      justify-content:center;
      margin:18px 0 10px;
      flex-wrap:wrap;
    }

    input{
      width:min(420px, 86vw);
      padding:14px 14px;
      border-radius:16px;
      border:1px solid var(--soft2);
      background:rgba(255,255,255,.03);
      color:#fff;
      outline:none;
      font-size:16px;
      letter-spacing:.12em;
      text-align:center;
    }

    input:focus{border-color:rgba(255,255,255,.38)}

    .msg{
      text-align:center;
      min-height:20px;
      margin-top:8px;
      color:rgba(255,255,255,.78);
      font-size:13px;
      letter-spacing:.06em;
    }

    /* Story */
    .story{
      margin: 6px auto 0;
      width:min(640px, 92vw);
      border:1px solid var(--soft);
      border-radius:18px;
      padding:16px 14px;
      background:rgba(0,0,0,.35);
    }

    .story pre{
      margin:0;
      white-space:pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:14px;
      line-height:1.55;
      color:rgba(255,255,255,.86);
    }

    /* Lucky block */
    .blockWrap{
      display:grid;
      place-items:center;
      margin:18px 0 8px;
    }

    .luckyBlock{
      width:92px;
      height:92px;
      border-radius:18px;
      background: linear-gradient(145deg, #0b0b0b, #000);
      border:1px solid rgba(255,255,255,.14);
      box-shadow: 0 18px 60px rgba(0,0,0,.65), inset 0 0 0 1px rgba(255,255,255,.06);
      position:relative;
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease;
    }

    .luckyBlock:hover{transform: translateY(-1px); border-color:rgba(255,255,255,.28)}
    .luckyBlock:active{transform: translateY(0px) scale(.99)}

    .luckyBlock:before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.16);
    }

    .luckyBlock:after{
      content:"?";
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      font-weight:900;
      font-size:34px;
      letter-spacing:.08em;
      color:rgba(255,255,255,.18);
      text-shadow:0 0 18px rgba(255,255,255,.08);
    }

    /* Fullscreen FX layer */
    .fx{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:0;
      transition: opacity .25s ease;
      z-index:50;
    }
    .fx.show{opacity:1}

    /* glitch text */
    .glitchCenter{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      z-index:60;
      pointer-events:none;
      opacity:0;
      transition: opacity .2s ease;
    }
    .glitchCenter.show{opacity:1}

    .glitch{
      font-size:min(56px, 9vw);
      letter-spacing:.22em;
      font-weight:900;
      text-transform:uppercase;
      text-align:center;
      color:#fff;
      text-shadow:
        2px 0 rgba(255,255,255,.2),
        -2px 0 rgba(255,255,255,.12),
        0 0 24px rgba(255,255,255,.12);
      animation: glitch 700ms infinite;
      padding:0 18px;
    }

    @keyframes glitch{
      0%{transform: translate(0,0) skewX(0deg)}
      12%{transform: translate(-1px,0) skewX(2deg)}
      24%{transform: translate(2px,1px) skewX(-2deg)}
      36%{transform: translate(-2px,-1px) skewX(1deg)}
      48%{transform: translate(1px,-1px) skewX(-1deg)}
      60%{transform: translate(0,1px) skewX(2deg)}
      72%{transform: translate(2px,0) skewX(-2deg)}
      84%{transform: translate(-1px,1px) skewX(1deg)}
      100%{transform: translate(0,0) skewX(0deg)}
    }

    /* Screen crack overlay */
    .crack{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 55%, rgba(255,255,255,.12), transparent 42%),
        linear-gradient(30deg, transparent 0 48%, rgba(255,255,255,.18) 49% 51%, transparent 52% 100%),
        linear-gradient(-18deg, transparent 0 47%, rgba(255,255,255,.16) 48% 50%, transparent 51% 100%),
        linear-gradient(82deg, transparent 0 46%, rgba(255,255,255,.14) 47% 49%, transparent 50% 100%),
        linear-gradient(-72deg, transparent 0 49%, rgba(255,255,255,.12) 50% 52%, transparent 53% 100%);
      opacity:.0;
      transition: opacity .3s ease;
    }
    .fx.show .crack{opacity:.55}

    /* Secret unlock animation */
    .unlock{
      position:fixed;
      inset:0;
      z-index:70;
      display:grid;
      place-items:center;
      background:#000;
      opacity:0;
      pointer-events:none;
      transition: opacity .2s ease;
    }
    .unlock.show{opacity:1; pointer-events:auto}

    .ring{
      width:min(520px, 88vw);
      height:min(520px, 88vw);
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
    }

    .ring:before{
      content:"";
      position:absolute;
      inset:-40%;
      background: conic-gradient(from 180deg, rgba(255,255,255,0), rgba(255,255,255,.22), rgba(255,255,255,0));
      animation: spin 1.2s linear infinite;
    }

    .ring:after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:999px;
      background:#000;
      border:1px solid rgba(255,255,255,.08);
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .unlockText{
      position:relative;
      z-index:2;
      text-align:center;
      padding:0 18px;
    }

    .unlockText .big{
      font-size:min(58px, 9vw);
      font-weight:900;
      letter-spacing:.18em;
      text-transform:uppercase;
      margin:0;
    }

    .unlockText .small{
      margin:10px 0 0;
      color:rgba(255,255,255,.7);
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:12px;
    }

    /* Ending card */
    .endCard{
      width:min(640px, 92vw);
      margin: 10px auto 0;
      border:1px solid var(--soft);
      border-radius:20px;
      padding:16px 14px;
      background:rgba(255,255,255,.02);
      text-align:center;
    }

    .endCode{
      font-weight:900;
      font-size:34px;
      letter-spacing:.22em;
      margin:6px 0 10px;
      text-transform:uppercase;
    }

    .footer{
      padding:14px 18px;
      border-top:1px solid var(--soft);
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      color:rgba(255,255,255,.55);
      font-size:12px;
      letter-spacing:.08em;
      flex: 0 0 auto;
    }

    .link{
      color:rgba(255,255,255,.72);
      text-decoration:none;
      border-bottom:1px dashed rgba(255,255,255,.22);
    }

    .link:hover{color:#fff; border-bottom-color:rgba(255,255,255,.45)}

    /* Mobile tweaks */
    @media (max-width:520px){
      .wrap{padding:14px}
      .card{height: calc(100vh - 28px)}
      .title{font-size:34px}
      .content{padding:18px 12px 16px}
      button{width:100%}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="topbar">
        <div class="brand">
          <div class="dot"></div>
          <h1>BROKEN HEART</h1>
        </div>
        <div class="hint" id="hint">GATE</div>
      </div>

      <div class="content" id="app"></div>

      <div class="footer">
        <div>LOCAL MODE Ģ NO TRACKING Ģ NO DATA</div>
        <a class="link" href="#" id="reset">Reset</a>
      </div>
    </div>
  </div>

  <!-- FX layers -->
  <div class="fx" id="fx">
    <div class="crack"></div>
  </div>

  <div class="glitchCenter" id="glitchCenter">
    <div class="glitch" id="glitchText">YOU SHOULDN'T HAVE</div>
  </div>

  <div class="unlock" id="unlock">
    <div class="ring">
      <div class="unlockText">
        <p class="big">YOU UNLOCKED<br>THE VOID</p>
        <p class="small">9281. ACCEPTED</p>
      </div>
    </div>
  </div>

<script>
(() => {
  // ====== CONFIG ======
  const PASS_MAIN = "4820";
  const PASS_SECRET = "9281."; // dot required

  const STORAGE = {
    gate: "bh_gate",                // "main" | "inside" | "secret"
    seenBad: "bh_seen_bad",         // "1"
    ultraUnlocked: "bh_ultra"       // "1"
  };

  const app = document.getElementById("app");
  const hint = document.getElementById("hint");
  const resetBtn = document.getElementById("reset");

  const fx = document.getElementById("fx");
  const glitchCenter = document.getElementById("glitchCenter");
  const glitchText = document.getElementById("glitchText");
  const unlock = document.getElementById("unlock");

  const state = {
    gate: localStorage.getItem(STORAGE.gate) || "main",
    seenBad: localStorage.getItem(STORAGE.seenBad) === "1",
    ultraUnlocked: localStorage.getItem(STORAGE.ultraUnlocked) === "1",
  };

  // ====== UTIL ======
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function setGate(next){
    state.gate = next;
    localStorage.setItem(STORAGE.gate, next);
  }

  function setSeenBad(v){
    state.seenBad = v;
    localStorage.setItem(STORAGE.seenBad, v ? "1" : "0");
  }

  function setUltraUnlocked(v){
    state.ultraUnlocked = v;
    localStorage.setItem(STORAGE.ultraUnlocked, v ? "1" : "0");
  }

  function clearAll(){
    Object.values(STORAGE).forEach(k => localStorage.removeItem(k));
    state.gate = "main";
    state.seenBad = false;
    state.ultraUnlocked = false;
    render();
  }

  resetBtn.addEventListener("click", (e) => {
    e.preventDefault();
    clearAll();
  });

  function el(html){
    const t = document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  // ====== SCREENS ======
  function screenGate(){
    hint.textContent = "GATE";

    const isUltra = state.ultraUnlocked;

    const node = el(`
      <div>
        <div class="title">BROKEN HEART</div>
        <p class="subtitle">
          Enter the passcode.<br>
          <span style="opacity:.75">(There are two.)</span>
        </p>

        <div class="pin">
          <input id="pin" inputmode="text" autocomplete="off" spellcheck="false" placeholder="ĢĢĢĢ" />
        </div>

        <div class="row">
          <button class="primary" id="enter">ENTER</button>
          <button class="ghost" id="hintBtn">HINT</button>
        </div>

        <div class="msg" id="msg"></div>

        <p class="subtitle" style="margin-top:18px">
          ${isUltra ? "A memory is already stored." : "No memory stored."}
        </p>
      </div>
    `);

    const pin = node.querySelector("#pin");
    const msg = node.querySelector("#msg");

    const enter = async () => {
      const v = (pin.value || "").trim();

      // Main gate
      if(v === PASS_MAIN){
        msg.textContent = "Accepted.";
        await sleep(120);
        setGate("inside");
        render();
        return;
      }

      // Secret gate with dot
      if(v === PASS_SECRET){
        // Only allow secret mode if ultra unlocked happened at least once
        if(!state.ultraUnlocked){
          msg.textContent = "Nothing happens.";
          return;
        }

        msg.textContent = "Accepted.";
        await sleep(120);
        await secretUnlockAnimation();
        setGate("secret");
        render();
        return;
      }

      // If they type without dot
      if(v === "9281"){
        msg.textContent = "You forgot something.";
        return;
      }

      msg.textContent = "Wrong.";
    };

    node.querySelector("#enter").addEventListener("click", enter);
    pin.addEventListener("keydown", (e) => {
      if(e.key === "Enter") enter();
    });

    node.querySelector("#hintBtn").addEventListener("click", () => {
      msg.textContent = "First is 4 digits. Second has a dot.";
    });

    // Autofocus
    setTimeout(() => pin.focus(), 50);

    return node;
  }

  function screenWelcome(){
    hint.textContent = "WELCOME";

    const node = el(`
      <div>
        <div class="title">WELCOME</div>
        <p class="subtitle">Do you like to play a game with secret endings<br>or make a person come alive?</p>

        <div class="row">
          <button class="primary" id="game">GAME</button>
          <button class="danger" id="alive">MAKE PERSON ALIVE</button>
          <button class="ghost" id="back">BACK</button>
        </div>
      </div>
    `);

    node.querySelector("#game").addEventListener("click", () => {
      renderStory("start");
    });

    node.querySelector("#alive").addEventListener("click", () => {
      renderAlive();
    });

    node.querySelector("#back").addEventListener("click", () => {
      setGate("main");
      render();
    });

    return node;
  }

  function renderAlive(){
    hint.textContent = "REALITY";

    app.innerHTML = "";
    app.appendChild(el(`
      <div>
        <div class="title" style="font-size:36px">NO.</div>
        <p class="subtitle" style="max-width:560px;margin:0 auto">
          I AM NOT A GOD BRUH ??<br>
          WHAT WERE YOU THINKING, STUPID
        </p>

        <div class="row" style="margin-top:22px">
          <button class="primary" id="back">BACK</button>
        </div>
      </div>
    `));

    app.querySelector("#back").addEventListener("click", () => render());
  }

  // ====== STORY GAME ======
  const story = {
    start: {
      text:
`THE ROOM IS QUIET.

A message sits on your screen.
Pinned.
Old.

Do you open it?`,
      choices: [
        { label: "YES", next: "open" },
        { label: "NO", next: "ending_bad", markBad: true }
      ]
    },

    open: {
      text:
`YOU OPEN IT.

It's not a paragraph.
It's not an apology.

It's just one line:

"you still there?"`,
      choices: [
        { label: "REPLY", next: "reply" },
        { label: "CLOSE", next: "close_old" }
      ]
    },

    reply: {
      text:
`You type.

Your fingers shake.
You send it anyway.

The typing bubble appears...

...then disappears.

No reply.`,
      choices: [
        { label: "WAIT", next: "wait" },
        { label: "CLOSE", next: "close_old" }
      ]
    },

    wait: {
      text:
`You wait.

You refresh.
You check again.

Nothing.

Your chest does that thing.

Yeah.
That thing.`,
      choices: [
        { label: "END", next: "ending_bad2", markBad: true },
        { label: "PLAY AGAIN", next: "start" }
      ]
    },

    close_old: {
      text:
`You close it.

You tell yourself it doesn't matter.

But your hand still hovers...

Like you're waiting for permission.`,
      choices: [
        { label: "OPEN AGAIN", next: "open_again" },
        { label: "LEAVE", next: "ending_soft" }
      ]
    },

    open_again: {
      text:
`You open it again.

The line is still there.

"you still there?"

But now...

it feels like it's asking you.`,
      choices: [
        { label: "YES", next: "yes" },
        { label: "NO", next: "ending_soft" }
      ]
    },

    yes: {
      text:
`You whisper yes.

Not to them.

To the version of you that still hopes.

The room gets colder.`,
      choices: [
        { label: "CONTINUE", next: "door" },
        { label: "STOP", next: "ending_soft" }
      ]
    },

    door: {
      text:
`A door appears.

Not on the wall.

On your screen.

It has no handle.

Only a symbol:

[   ]`,
      choices: [
        { label: "TOUCH", next: "touch" },
        { label: "RUN", next: "ending_bad", markBad: true }
      ]
    },

    touch: {
      text:
`Your finger touches the symbol.

The screen flickers.

A black cube drops into your hands.

A lucky block.

But wrong.

Too quiet.
Too black.`,
      choices: [
        { label: "PRESS THE BLOCK", next: "block" },
        { label: "DROP IT", next: "ending_soft" }
      ]
    },

    block: {
      text:
`The block waits.

It feels like a dare.

Press it.`,
      choices: [
        { label: "PRESS", next: "block_press" },
        { label: "LEAVE", next: "ending_soft" }
      ],
      hasBlock: true
    },

    ending_bad: {
      text:
`BAD ENDING: COWARD ROUTE

You left.

You survived.

But you will think about it later.

(You always do.)`,
      choices: [
        { label: "PLAY AGAIN", next: "start", markBad: true }
      ]
    },

    ending_bad2: {
      text:
`BAD ENDING: MESSAGE FAILED

You tried to revive a dead moment.

It stayed dead.`,
      choices: [
        { label: "PLAY AGAIN", next: "start", markBad: true }
      ]
    },

    ending_soft: {
      text:
`ENDING: QUIET EXIT

Nothing dramatic.

No monsters.
No screams.

Just you...

closing a door that was never yours.`,
      choices: [
        { label: "PLAY AGAIN", next: "start" },
        { label: "BACK", next: "__back" }
      ]
    },

    // reached only by FX sequence
    memory_reset: {
      text:
`The room resets.

But now...
it remembers you.

CODE: 9281.

(The dot matters.)`,
      choices: [
        { label: "RETURN TO GATE", next: "__back" }
      ]
    }
  };

  // ====== STORY RENDER ======
  function renderStory(nodeKey){
    hint.textContent = "GAME";
    app.innerHTML = "";

    const node = story[nodeKey];
    if(!node){
      render();
      return;
    }

    const shell = el(`
      <div>
        <div class="title" style="font-size:34px">BROKEN HEART</div>
        <p class="subtitle">Secret endings exist.</p>

        <div class="story">
          <pre id="text"></pre>
        </div>

        <div class="blockWrap" id="blockWrap" style="display:none">
          <div class="luckyBlock" id="lucky"></div>
        </div>

        <div class="row" id="choices"></div>
      </div>
    `);

    const text = shell.querySelector("#text");
    const choices = shell.querySelector("#choices");
    const blockWrap = shell.querySelector("#blockWrap");
    const lucky = shell.querySelector("#lucky");

    text.textContent = node.text;

    // show block if node has it
    if(node.hasBlock){
      blockWrap.style.display = "grid";
      lucky.addEventListener("click", async () => {
        await blockSequence();
      });
    }

    // choices
    node.choices.forEach(c => {
      const b = document.createElement("button");
      b.textContent = c.label;
      if(c.label === "END") b.className = "danger";
      if(c.label === "BACK") b.className = "ghost";

      b.addEventListener("click", () => {
        if(c.markBad) setSeenBad(true);

        if(c.next === "__back"){
          setGate("inside");
          render();
          return;
        }

        renderStory(c.next);
      });

      choices.appendChild(b);
    });

    // ULTRA SECRET BUTTON: only at close_old, only after seeing a bad ending
    if(nodeKey === "close_old" && state.seenBad){
      const secretBtn = document.createElement("button");
      secretBtn.textContent = "DELETE THE PINNED MESSAGE";
      secretBtn.className = "ghost";

      secretBtn.addEventListener("click", () => {
        setUltraUnlocked(true);
        renderStory("door");
      });

      choices.appendChild(secretBtn);
    }

    app.appendChild(shell);
  }

  // ====== FX SEQUENCES ======
  async function blockSequence(){
    glitchText.textContent = "YOU SHOULDN'T HAVE";
    glitchCenter.classList.add("show");
    fx.classList.add("show");

    await sleep(900);

    glitchText.textContent = "TOUCHED THAT";
    await sleep(700);

    glitchText.textContent = "...";
    await sleep(450);

    glitchCenter.classList.remove("show");

    // Ask continue
    app.innerHTML = "";
    hint.textContent = "WARNING";

    app.appendChild(el(`
      <div>
        <div class="title" style="font-size:32px">SCREEN DAMAGED</div>
        <p class="subtitle">Do you like to continue?</p>
        <div class="row">
          <button class="primary" id="yes">CONTINUE</button>
          <button class="ghost" id="no">NO</button>
        </div>
      </div>
    `));

    app.querySelector("#yes").addEventListener("click", async () => {
      await memoryReset();
    });

    app.querySelector("#no").addEventListener("click", () => {
      fx.classList.remove("show");
      renderStory("ending_soft");
    });
  }

  async function memoryReset(){
    hint.textContent = "RESET";
    await sleep(250);
    fx.classList.remove("show");
    renderStory("memory_reset");
    setUltraUnlocked(true);
    await sleep(80);
  }

  async function secretUnlockAnimation(){
    unlock.classList.add("show");
    await sleep(1400);
    unlock.classList.remove("show");
    await sleep(160);
  }

  // ====== SECRET ENDING SCREEN (NO TASKS) ======
  function screenSecretEnding(){
    hint.textContent = "VOID";

    const node = el(`
      <div>
        <div class="title" style="font-size:34px">RARE ENDING</div>
        <p class="subtitle">
          You came back.<br>
          <span style="opacity:.75">And the room noticed.</span>
        </p>

        <div class="endCard">
          <div class="subtitle" style="margin:0 0 6px">CODE</div>
          <div class="endCode">3851</div>
          <div class="subtitle" style="margin:0">
            It doesn't belong here.<br>
            Find the next piece where you found the first.
          </div>
        </div>

        <div class="row" style="margin-top:18px">
          <button class="primary" id="back">BACK TO GATE</button>
          <button class="ghost" id="replay">REPLAY GAME</button>
        </div>
      </div>
    `);

    node.querySelector("#back").addEventListener("click", () => {
      setGate("main");
      render();
    });

    node.querySelector("#replay").addEventListener("click", () => {
      setGate("inside");
      render();
    });

    return node;
  }

  // ====== MAIN RENDER ======
  function render(){
    app.innerHTML = "";

    if(state.gate === "main"){
      app.appendChild(screenGate());
      return;
    }

    if(state.gate === "inside"){
      app.appendChild(screenWelcome());
      return;
    }

    if(state.gate === "secret"){
      app.appendChild(screenSecretEnding());
      return;
    }

    setGate("main");
    app.appendChild(screenGate());
  }

  render();
})();
</script>
</body>
</html>
